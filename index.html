<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/golfappicon-69022232357c6/ios/AppIcon.appiconset/Icon-App-40x40@2x.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050d09" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3f8f4" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Golf Trip" />
    <link rel="apple-touch-icon" href="/golfappicon-69022232357c6/ios/AppIcon.appiconset/Icon-App-60x60@3x.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Golf Trip</title>
    <script>
      // Apply the saved (or default dark) theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem("golfTripTheme");
          var isDark = stored ? stored === "dark" : true;
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
